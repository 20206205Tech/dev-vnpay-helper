name: Build and Deploy Script

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-deps:
    runs-on: ubuntu-latest
    outputs:
      deps-cache-key: ${{ steps.cache-key.outputs.CACHE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Calculate cache key
        id: cache-key
        run: |
          echo "CACHE_KEY=deps-node-modules-${{ hashFiles('package-lock.json') }}" >> "$GITHUB_OUTPUT"
      - name: Download cached dependencies
        uses: actions/cache@v3
        id: cache
        with:
          path: node_modules
          key: ${{ steps.cache-key.outputs.CACHE_KEY }}
          restore-keys: |
            deps-node-modules-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

  build-and-push:
    runs-on: ubuntu-latest
    needs: install-deps

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Download cached dependencies
        uses: actions/cache@v3
        id: cache
        with:
          path: node_modules
          key: ${{ needs.install-deps.outputs.deps-cache-key }}

      - name: Build the script
        run: npm run build

      - name: Show built script content
        run: cat dist/dev-vnpay-helper.user.js

      - name: Đẩy code sang nhánh build
        if: github.ref == 'refs/heads/main'
        run: |
          # Thiết lập danh tính cho bot của GitHub
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Chuyển sang nhánh 'build'
          git checkout -B build

          # Ép git nhận thư mục dist/
          git add -f dist/

          # Commit và Push đè nhánh build
          git commit -m "Auto-build từ commit: ${GITHUB_SHA::7}" || echo "Không có thay đổi nào để commit"
          git push -f origin build
